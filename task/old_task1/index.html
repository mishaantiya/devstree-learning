<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare application</title>
</head>
<body>
     <h2 align="center">Patient Registration Form</h2>
    <form>
        <fieldset>
       
<label for="fname">Full Name :</label>
<input type="text" ><br><br>

<label for="dob">Date Of Birth :</label>
<input type="date" ><br><br>
<p>Gender :</p>
<input type="radio" id="male" name="gender" value="gender">
<label for="male">male</label>
  <input type="radio" id="female" name="gender" value="gender">
<label for="female">female</label> <br><br>

<label for="mob">Mobile number :</label>
<input type="number"><br><br>

<label for="email">Email :</label>
<input type="email"> <br><br>

<label for="address">Address :</label>
 <textarea name="message" rows="2" cols="30"></textarea> <br><br>


<label for="bloodgroup">Blood Group :</label>
<select>
    <option value="o+">O+</option>
    <option value="A+"selected>A+</option>
    <option value="B+">B+</option>
</select>
<br><br>
<label for="emergencycontact" >Emergency Contact :</label>
<input type="number"><br><br>

<p>Existing Diseases :</p>
<input type="checkbox" >

<label for="infectious diseases (caused by pathogens)">infectious diseases (caused by pathogens)</label>
 <input type="checkbox" >
<label for="non-communicable diseases (chronic conditions)"><label for="non-communicable diseases (chronic conditions)">infectious diseases (caused by pathogens)</label>
</label>
<input type="checkbox" >
<label for="genetic disorders (inherited traits)"><label for="genetic disorders (inherited traits)">infectious diseases (caused by pathogens)</label>
</label>
<br><br>


<label for="allergies">Allergies :</label>
 <textarea name="message" rows="3" cols="30"></textarea><br><br>
</form>

<label for="pad">Preffered Appointment Date :</label>
<input type="date" ><br><br>

<label for="pt">Preffered Time :</label>
<input type="time" ><br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset"><br><br>
    
    </fieldset>
    <f2 align="center"> THANK YOU </f2>
</body>
</html>
