<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     
.calculator {
  width: 250px;
  border: 2px solid #333;
  border-radius: 10px;
  padding: 15px;
  background-color: #f0f0f0;
}


.display {
  width: 100%;
  height: 40px;
  border: 1px solid #999;
  margin-bottom: 10px;
  font-size: 18px;
  text-align: right;
}


button {
  width: 35px;
  height: 35px;
  border: 1px solid #ccc;
  border-radius: 5px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
}
.ans{
    width: 150px;
}
 body{
    background-color: darkgray;
 }
       
    </style>
</head>
<body>
    
    <div class="calculator">
   <input type="text" placeholder="0" class="display"> 
<div class="button">
    <button>+</button>
    <button>-</button>
    <button>*</button>
    <button>/</button>
<br>
    <button>9</button>
    <button>8</button>
    <button>7</button>
    <button>6</button>
<br>
    <button>5</button>
    <button>4</button>
    <button>3</button>
    <button>2</button>
<br>
    <button>1</button>
    <button>0</button>
    <button>.</button>
    <button>C</button>
<br>
    <button class="ans">=</button>
</div>   
</div>
    

</body>
</html>
