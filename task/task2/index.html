<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats Preview Card</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="content">
            <h1>Get <b>insights</b> that help your business grow.</h1>
            <p class="description">
                Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
            </p>
            
            <div class="footer">
                <div class="stat">
                    <strong>10k+</strong>
                    <span class="s">COMPANIES</span>
                </div>
                <div class="stat">
                    <strong>314</strong>
                    <span class="s">TEMPLATES</span>
                </div>
                <div class="stat">
                    <strong>12M+</strong>
                    <span class="s">QUERIES</span>
                </div>
            </div>
        </div>

        <div class="image">
            <img src="../../task/images/image-header-desktop.jpg">
        </div>
    </div>

</body>
</html>
