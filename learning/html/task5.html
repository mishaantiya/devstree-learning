<!DOCTYPE html>
<html lang="en">
<head>

    <title>Table</title>
    <style>
        table, th, td, tr{
            border:2px solid black;
            border-collapse: collapse;
        }
        
    </style>
</head>
<body>

        </tr>

       <tbody>
        <tr>
            <td>1</td>
            <td>rahul</td>
            <td>21</td>
            <td>msc(ca & it)</td>
        </tr>
        <tr>
            <td>2</td>
            <td>mira</td>

        </tr>
       </tbody>
       
        <tr>
            <td colspan="2">Total Students: 2</td>
           
        </tr>
        <tr> <td rowspan="2">Average Age: 21</td></tr>
       
    </table>
</body>
</html>
