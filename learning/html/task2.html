<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formating text</title>
</head>
<body>
    <h1>Hello World!</h1>
    <p><b>Note :</b> This is a beautiful <mark>and peaceful </mark>place</p><br>
    <em><h2>About place</h2></em>
    <p>every flowers had a beautiful colors</p><hr><p>some of them is very small sized</p>

<strong> the blue one is so cute</strong>
<u><h3>smell of flowers</h3></u>
<q><h4>the smell of rose is very sweet</h4></q>
<cite><h5>But some flowers had not any kind of smell</h5></cite>
</body>
</html>
