<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    div{
         width: 150px;
  height: 150px;
  background-color: yellow;
  border: 1px solid rgb(223, 193, 193);
    }
    #mydiv {
  transform: scale(2, 3);
}
</style>
</head>
<body>
    <h1>
        this is a example for a 2D transformation.
    </h1>
    <div>
        this is a simple element
    </div>
    <div id="mydiv">this is a 2,3 scaled element</div>

</body>
</html>
