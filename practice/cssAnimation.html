<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    img{
        position: relative;
        animation-name: myAnimation;
  animation-duration: 4s;
  filter: blur(1px);
    }
    @keyframes myAnimation {
        0%{left: 0px; top:0px;}
        25%{left: 0px; top:200px;}
        50%{left: 200px; top:200px;}
        75%{left: 200px; top:0px;}
        100%{left: 0px; top:0px;}
        
    }
</style>
</head>
<body>
    <img src="https://static.vecteezy.com/system/resources/thumbnails/074/519/153/small/an-adorable-fluffy-puppy-with-a-pink-flower-on-its-head-stares-forward-with-big-dark-eyes-photo.jpg" width="100px" height="100px">
</body>
</html>
